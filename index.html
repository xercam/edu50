<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi vídeo</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      padding: 2rem 0;
    }

    /* 👇 AQUÍ, sustituye el bloque .foto por este */
.foto {
  width: 90%;
  max-width: 800px;
  height: 300px;
  border-radius: 8px;
  margin-bottom: 1.5rem;
  object-fit: contain;
  display: block;
}

    h1 { font-size: 1.2rem; color: #333; margin-bottom: 1rem; }
    .video-wrapper {
      width: 90%;
      max-width: 800px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
   <!-- FOTO: sustituye "foto.jpg" por el nombre real de tu imagen -->
  <img class="foto" src="edu.jpg" alt="Descripción de la foto">
  
  <h1>"Nunca dejes de tocar" Edu 50 Cumpleaños</h1>
  <div class="video-wrapper">
    <!-- Sustituye XXXXXXX por el ID de tu vídeo de YouTube -->
    <iframe
      src="https://www.youtube.com/embed/XXXXXXX"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
